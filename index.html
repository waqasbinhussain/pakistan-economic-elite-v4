<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pakistan Economic Elite Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #020617;
      color: #e2e8f0;
    }

    .container {
      width: 90%;
      margin: auto;
      padding: 20px 0;
    }

    h1, h2 { color: white; }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4,1fr);
      gap: 15px;
      margin-bottom: 30px;
    }

    .card {
      background: #0f172a;
      padding: 20px;
      border-radius: 10px;
    }

    .table-head, .table-row {
      display: grid;
      grid-template-columns: repeat(4,1fr);
      padding: 10px;
    }

    .table-head {
      font-weight: bold;
      background: #020617;
    }

    .table-row {
      border-top: 1px solid #334155;
    }

    .chart-box {
      height: 300px;
      margin-bottom: 30px;
    }

    .source-grid {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 15px;
    }

    .source-card {
      background: #0f172a;
      padding: 15px;
      border-radius: 10px;
    }

    a { color: #22d3ee; }
  </style>
</head>

<body>

<div class="container">

  <h1>Pakistan Economic Elite Dashboard</h1>

  <!-- KPI -->
  <div class="kpi-grid">
    <div class="card">
      <h3>Public Debt</h3>
      <div class="kpi-value" data-target="80.5">0</div>
    </div>

    <div class="card">
      <h3>Best Growth</h3>
      <div class="kpi-value"></div>
    </div>

    <div class="card">
      <h3>Debt Increase</h3>
      <div class="kpi-value"></div>
    </div>

    <div class="card">
      <h3>Risk</h3>
      <div class="kpi-value"></div>
    </div>
  </div>

  <!-- Charts -->
  <canvas id="debtChart" class="chart-box"></canvas>
  <canvas id="growthChart" class="chart-box"></canvas>
  <canvas id="tenureChart" class="chart-box"></canvas>

  <!-- Table -->
  <h2>Political Comparison</h2>
  <div class="table" id="tenureTable">
    <div class="table-head">
      <div>Tenure</div>
      <div>Growth</div>
      <div>Debt</div>
      <div>Verdict</div>
    </div>
  </div>

  <!-- Sources -->
  <h2>Sources</h2>
  <div class="source-grid" id="sourceGrid"></div>

</div>

<script>
async function loadDashboard() {

  const res = await fetch('./data.json');
  const data = await res.json();

  const labels = data.labels;
  const debtData = data.debtData;
  const growthData = data.growthData;

  // KPI
  const kpis = document.querySelectorAll('.kpi-value');
  kpis[0].dataset.target = data.kpis.publicDebtFY2025;
  kpis[1].textContent = data.kpis.bestAvgGrowth;
  kpis[2].textContent = data.kpis.largestDebtIncrease;
  kpis[3].textContent = data.kpis.keyRisk;

  // Animated counter
  document.querySelectorAll('.kpi-value[data-target]').forEach(el => {
    let target = parseFloat(el.dataset.target);
    let start = 0;
    let step = target / 50;

    let interval = setInterval(() => {
      start += step;
      if(start >= target){
        el.textContent = target + "T";
        clearInterval(interval);
      } else {
        el.textContent = start.toFixed(1);
      }
    }, 20);
  });

  // Charts
  new Chart(document.getElementById('debtChart'), {
    type: 'line',
    data: { labels, datasets: [{ label: 'Debt', data: debtData }] }
  });

  new Chart(document.getElementById('growthChart'), {
    type: 'bar',
    data: { labels, datasets: [{ label: 'Growth', data: growthData }] }
  });

  new Chart(document.getElementById('tenureChart'), {
    type: 'bar',
    data: {
      labels: data.tenureChart.labels,
      datasets: [
        { label: 'Growth', data: data.tenureChart.avgGrowth },
        { label: 'Debt', data: data.tenureChart.debtIncrease }
      ]
    }
  });

  // TABLE
  const table = document.getElementById('tenureTable');
  table.innerHTML += data.tenureTable.map(row => `
    <div class="table-row">
      <div>${row.name}</div>
      <div>${row.avgGrowth}</div>
      <div>${row.debtIncrease}</div>
      <div>${row.verdict}</div>
    </div>
  `).join('');

  // SOURCES
  const sources = document.getElementById('sourceGrid');
  sources.innerHTML = data.sources.map(s => `
    <div class="source-card">
      <strong>${s.title}</strong>
      <p>${s.note}</p>
      <a href="${s.link}" target="_blank">${s.linkText}</a>
    </div>
  `).join('');
}

loadDashboard();
</script>

</body>
</html>
